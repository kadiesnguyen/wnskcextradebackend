# Nginx snippet — admin.wnskcex.com
# Replace ThinkPHP admin with Next.js admin frontend.
# Laravel admin API stays on api.wnskcex.com (/api/admin); no API proxy required unless you want same-origin.
#
# Install: include inside the admin.wnskcex.com server {} block (aaPanel / BT Panel / manual nginx).

# --- Option A: Static export (after `output: 'export'` in next.config + `npm run build`) ---
# root /www/wwwroot/admin.wnskcex.com/out;
# index index.html;
#
# location / {
#     try_files $uri $uri/ $uri.html /index.html;
# }

# --- Option B: Node.js (Next.js `next start` on port 3001, managed by PM2) ---
upstream admin_frontend {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name admin.wnskcex.com;

    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    access_log /www/wwwlogs/admin.wnskcex.com.log;
    error_log  /www/wwwlogs/admin.wnskcex.com.error.log;

    location / {
        proxy_pass http://admin_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /_next/static/ {
        proxy_pass http://admin_frontend;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}

# --- Option C (optional): same-origin API proxy — only if NEXT_PUBLIC_ADMIN_API_URL=/api/admin ---
# location /api/admin/ {
#     proxy_pass https://api.wnskcex.com/api/admin/;
#     proxy_set_header Host api.wnskcex.com;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
# }

server {
    listen 80;
    server_name admin.wnskcex.com;
    return 301 https://$host$request_uri;
}
