<include file="Public:header" />
<script type="text/javascript" src="__PUBLIC__/layer/laydate/laydate.js"></script>
<div id="main-content">
	<div id="top-alert" class="fixed alert alert-error" style="display: none;">
		<button class="close fixed" style="margin-top: 4px;">×</button>
		<div class="alert-content">{:L('Alert content')}</div>
	</div>
	<div id="main" class="main">
		<div class="main-title-h">
			<span class="h1-title"><a href="{:U('Article/index')}">{:L('Notification management')}</a> >></span>
			<span class="h1-title">
				<empty name="data">{:L('Add notification')}
					<else />{:L('Edit notification')}
				</empty>
			</span>
		</div>
		<div class="tab-wrap">
			<div class="tab-content">
				<form id="form" action="{:U('Article/ggeditup')}" method="post" class="form-horizontal"
					enctype="multipart/form-data">
					<div id="tab" class="tab-pane in tab">
						<div class="form-item cf">
							<table>
								<tr class="controls">
									<td class="item-label">{:L('Notification title label')}:</td>
									<td>
										<input type="text" class="form-control input-10x" name="title"
											value="{$data.title}">
									</td>
									<td class="item-note"></td>
								</tr>

								<tr class="controls">
									<td class="item-label">{:L('Thumbnail')}:</td>
									<td>
										<div id="addpicContainer">
											<notempty name="data.img">
												<!--Nếu không có hình ảnh, hiển thị hình ảnh mặc định-->
												<img id="up_img" onclick="getElementById('inputfile').click()"
													style="cursor:pointer;max-width:100px;"
													title="{:L('Click to add image')}" alt="{:L('Click to add image')}"
													src="/Upload/article/{$data.img}">
												<else />
												<!--Nếu không có hình ảnh, hiển thị hình ảnh mặc định-->
												<img id="up_img" onclick="getElementById('inputfile').click()"
													style="cursor:pointer;max-width:100px;"
													title="{:L('Click to add image')}" alt="{:L('Click to add image')}"
													src="__PUBLIC__/Admin/images/addimg.png">
											</notempty>
											<input type="hidden" id="img" name="img" value="{$data.img}">
											<input type="file" id="inputfile"
												style="height:0;width:0;z-index: -1; position: absolute;left: 10px;top: 5px;"
												value="/Upload/wenzhang/{$data.img}" />
										</div>
									</td>
									<td class="item-note"></td>
								</tr>

								<br /><br />
								<tr class="controls" style="margin-top:30px;">
									<td class="item-label">{:L('Notification content')}:</td>
									<td>
										<textarea name="content"
											class="form-control input-10x">{$data.content}</textarea>
									</td>
									<td class="item-note"></td>
								</tr>

								<tr class="controls">
									<td class="item-label">{:L('Status label')}:</td>
									<td>
										<select name="status" class="form-control input-10x">
											<option value="1" <eq name="data.status" value="1">selected</eq>>{:L('Display')}
											</option>
											<option value="2" <eq name="data.status" value="2">selected</eq>>{:L('Hidden')}</option>
										</select>
									</td>
									<td class="item-note"></td>
								</tr>
								<input type="hidden" name="id" value="{$data.id}" />
								<tr class="controls">
									<td class="item-label"></td>
									<td>
										<div class="form-item cf">
											<button class="ajax-post btn submit-btn" id="submit" type="submit"
												target-form="form-horizontal">{:L('Save')}</button>
											<a class="btn btn-return" href="{$Think.server.HTTP_REFERER}">{:L('Return')}</a>
											<notempty name="data.id"><input type="hidden" name="id"
													value="{$data.id}" />
											</notempty>
										</div>
									</td>
								</tr>
							</table>
						</div>
					</div>
				</form>
				<script type="text/javascript">
					// Gửi form
					$('#submit').click(function () {
						$('#form').submit();
					});
				</script>
			</div>
		</div>
	</div>
</div>
<script type="text/javascript" src="__PUBLIC__/kindeditor/kindeditor-min.js"></script>
<script type="text/javascript">
	var editor;
	KindEditor.ready(function (K) {
		editor = K.create('textarea[name="content"]', {
			width: '800px',
			height: '300px',
			allowPreviewEmoticons: false,
			allowImageUpload: true,
			uploadJson: "{:U('Article/uploadImage')}",
			items: [
				'source', 'fontname', 'fontsize', '|', 'forecolor', 'hilitecolor', 'bold', 'italic', 'underline',
				'removeformat', '|', 'justifyleft', 'justifycenter', 'justifyright', 'insertorderedlist',
				'insertunorderedlist', '|', 'emoticons', 'image', 'link', 'fullscreen'],
			afterBlur: function () {
				this.sync();
			}
		});
	});
</script>
<script type="text/javascript">
	/** Số điện thoại端网站logo上传 **/
	$(document).ready(function () {
		//响应文件添加成功事件
		$("#inputfile").change(function () {
			//创建FormData对象
			var data = new FormData();
			//为FormData对象添加数据
			$.each($('#inputfile')[0].files, function (i, file) {
				data.append('upload_file' + i, file);
			});
			//发送数据
			$.ajax({
				url: '/Admin/Article/wenzhangimg',
				type: 'POST',
				data: data,
				cache: false,
				contentType: false,		//不可缺参数
				processData: false,		//不可缺参数
				success: function (data) {
					if (data) {
						$('#up_img').attr("src", '/Upload/article/' + $.trim(data));
						$('#img').val($.trim(data));
						$('#up_img').show();
					}
				},
				error: function () {
					alert('{:L("Upload error")}');
					$(".loading").hide();	//加载失败移除加载Hình ảnh
				}
			});
		});
	});
</script>
<include file="Public:footer" />
<block name="script">
	<script type="text/javascript" charset="utf-8">
		// Đánh dấu điều hướng
		highlight_subnav("{:U('Article/index')}");
	</script>
</block>
