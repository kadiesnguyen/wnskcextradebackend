<include file="Public:header"/>
<div id="main-content">
	<div id="top-alert" class="fixed alert alert-error" style="display: none;">
		<button class="close fixed" style="margin-top: 4px;">×</button>
		<div class="alert-content">{:L('Alert content')}</div>
	</div>
	<div id="main" class="main">
		<div class="main-title-h">
			<span class="h1-title"><a href="{:U('Article/index')}">{:L('Notification center')}</a></span>
		</div>
		<div class="cf">
			<div class="fl">
				<a class="btn btn-success" href="{:U('Article/edit')}">{:L('Add new')}</a>
				<button class="btn ajax-post confirm btn-danger" url="{:U('Article/setstatus',array('type'=>'1'))}" target-form="ids">{:L('Delete')}</button>
			</div>
		</div>
		<div class="data-table table-striped">
			<table class="">
				<thead>
					<tr>
						<th class="row-selected row-selected"><input class="check-all" type="checkbox"/></th>
						<th class="">ID</th>
						<th class="">{:L('Notification title')}</th>
						<th class="">{:L('Update time')}</th>
						<th class="">{:L('Status')}</th>
						<th class="">{:L('Action')}</th>
					</tr>
				</thead>
				<tbody>
					<notempty name="list">
						<volist name="list" id="vo">
							<tr>
								<td><input class="ids" type="checkbox" name="id[]" value="{$vo.id}"/></td>
								<td>{$vo.id}</td>
								<td>{$vo.title}</td>
								<td>{$vo.addtime}</td>
								<td><eq name="vo.status" value="1">{:L('Display')}<else/>{:L('Hidden')}</eq></td>
								<td><a href="{:U('Article/edit?id='.$vo['id'])}" class="btn btn-primary btn-xs">{:L('Edit')}</a></td>
							</tr>
						</volist>
					<else/>
						<td colspan="12" class="text-center empty-info"><i class="glyphicon glyphicon-exclamation-sign"></i>{:L('No data')}</td>
					</notempty>
				</tbody>
			</table>
			<div class="page">
				<div>{$page}</div>
			</div>
		</div>
	</div>
</div>
<include file="Public:footer"/>
<block name="script">
	<script type="text/javascript" charset="utf-8">
		// Đánh dấu điều hướng
		highlight_subnav("{:U('Article/index')}");
	</script>
</block>
