<include file="Public:header"/>
<div id="main-content">
	<div id="top-alert" class="fixed alert alert-error" style="display: none;">
		<button class="close fixed" style="margin-top: 4px;">×</button>
		<div class="alert-content">{:L('Alert content')}</div>
	</div>
	<div id="main" class="main">
		<div class="main-title-h">
			<span class="h1-title"><a href="{:U('User/admin')}">{:L('Admin management')}</a> >></span>
			<span class="h1-title"><empty name="data">{:L('Add admin')}<else/>{:L('Edit admin')}</empty></span>
		</div>
		<div class="tab-wrap">
			<div class="tab-content">
				<form id="form" action="{:U('User/adminEdit')}" method="post" class="form-horizontal">
					<div id="tab" class="tab-pane in tab">
						<div class="form-item cf">
							<table>
								<tr class="controls">
									<td class="item-label">{:L('Username')}:</td>
									<td>
										<input type="text" class="form-control input-10x" name="username" value="{$data.username}">
									</td>
									<td class="item-note">{:L('Username length note')}</td>
								</tr>
								<tr class="controls">
									<td class="item-label">{:L('Nickname')}:</td>
									<td>
										<input type="text" class="form-control input-10x" name="nickname" value="{$data.nickname}">
									</td>
									<td class="item-note">{:L('Note')}</td>
								</tr>
								<tr class="controls">
									<td class="item-label">{:L('Login password')}:</td>
									<td><input type="password" class="form-control input-10x" name="password" value=""></td>
									<td class="item-note">{:L('Leave blank to not update')}</td>
								</tr>
								<tr class="controls">
									<td class="item-label">{:L('Mobile phone')}:</td>
									<td><input type="text" class="form-control input-10x" name="moble" value="{$data.moble}"></td>
									<td class="item-note"></td>
								</tr>
								<tr class="controls">
									<td class="item-label">{:L('Email')}:</td>
									<td><input type="text" class="form-control input-10x" name="email" value="{$data.email}"></td>
									<td class="item-note"></td>
								</tr>
								<tr class="controls">
									<td class="item-label">{:L('Status')}:</td>
									<td>
										<select name="status" class="form-control input-10x">
											<option value="1" <eq name="data.status" value="1">selected</eq>>{:L('Normal')}</option>
											<option value="0" <eq name="data.status" value="0">selected</eq>>{:L('Freeze')}</option>
										</select>
									</td>
									<td class="item-note"></td>
								</tr>
								<tr class="controls">
									<td class="item-label"></td>
									<td>
										<div class="form-item cf">
											<button class="btn submit-btn ajax-post" id="submit" type="submit" target-form="form-horizontal">{:L('Save')}</button>
											<a class="btn btn-return" href="{$Think.server.HTTP_REFERER}">{:L('Go back')}</a>
											<notempty name="data.id"><input type="hidden" name="id" value="{$data.id}"/></notempty>
										</div>
									</td>
								</tr>
							</table>
						</div>
					</div>
				</form>
			</div>
		</div>
	</div>
</div>
<script type="text/javascript">
	// Gửi form
	$('#submit').click(function () {
		$('#form').submit();
	});
</script>
<include file="Public:footer"/>
<block name="script">
	<script type="text/javascript" charset="utf-8">
		// Đánh dấu điều hướng
		highlight_subnav("{:U('User/admin')}");
	</script>
</block>
