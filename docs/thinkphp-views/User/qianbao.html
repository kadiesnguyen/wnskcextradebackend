<include file="Public:header"/>
<div id="main-content">
	<div id="top-alert" class="fixed alert alert-error" style="display: none;">
		<button class="close fixed" style="margin-top: 4px;">×</button>
		<div class="alert-content">{:L('Alert content')}</div>
	</div>
	<div id="main" class="main">
		<div class="main-title-h">
			<span class="h1-title">{:L('User wallet')}</span>
		</div>
		<div class="cf">
			<div class="fl">
				<a class="btn btn-success" href="{:U('User/qianbaoEdit')}">{:L('Add new')}</a>
				<button class="btn ajax-post confirm btn-danger" url="{:U('User/qianbaoStatus',array('type'=>'del'))}" target-form="ids">{:L('Delete')}</button>
			</div>
			<div class="search-form fr cf">
				<div class="sleft">
					<form name="formSearch" id="formSearch" method="get" name="form1">
						<select style="width: 160px; float: left; margin-right: 10px;" name="coinname" class="form-control">
							<option value="" <empty name="Think.get.coinname">selected</empty>>{:L('Coin type')}</option>
							<volist name="coinlist" id="vo">
								<option value="{$vo['name']}" <eq name="vo['name']" value="$Think.get.coinname">selected</eq>>{$vo['title']}</option>
							</volist>
						</select>
						<select style="width: 160px; float: left; margin-right: 10px;" name="field" class="form-control">
							<option value="username" <eq name="Think.get.field" value="username">selected</eq>>{:L('Username')}</option>
						</select>
						<input type="text" name="name" class="search-input form-control" value="{$Think.get.name}" placeholder="{:L('Search content')}" style="">
						<a class="sch-btn" href="javascript:;" id="search"> <i class="btn-search"></i> </a>
					</form>
					<script>
						//Chức năng tìm kiếm
						$(function () {
							$('#search').click(function () {
								$('#formSearch').submit();
							});
						});
						// Nhập để tìm kiếm
						$(".search-input").keyup(function (e) {
							if (e.keyCode === 13) {
								$("#search").click();
								return false;
							}
						});
					</script>
				</div>
			</div>
		</div>
		<div class="data-table table-striped">
			<table class="">
				<thead>
				<tr>
					<th class="row-selected row-selected"><input class="check-all" type="checkbox"/></th>
					<th class="">ID</th>
					<th class="">{:L('Username')}</th>
					<th class="">{:L('Coin type')}</th>
					<th class="">{:L('Wallet name')}</th>
					<th class="">{:L('Wallet address')}</th>
					<th class="">{:L('Transaction time')}</th>
					<th class="">{:L('Action')}</th>
				</tr>
				</thead>
				<tbody>
				<notempty name="list">
					<volist name="list" id="vo">
						<tr>
							<td><input class="ids" type="checkbox" name="id[]" value="{$vo.id}"/></td>
							<td>{$vo.id}</td>
							<td>{$vo['username']}</td>
							<td><?php echo strtoupper($vo['name']);?></td>
							<td>{$vo.remark}</td>
							<td>{$vo.addr}</td>
							<td>{$vo.addtime}</td>
							<td><a href="{:U('User/qianbaoEdit?id='.$vo['id'])}" class="btn btn-primary btn-xs">{:L('Edit')}</a>
							</td>
						</tr>
					</volist>
					<else/>
					<td colspan="12" class="text-center empty-info"><i class="glyphicon glyphicon-exclamation-sign"></i>{:L('No data')}</td>
				</notempty>
				</tbody>
			</table>
			<div class="page">
				<div>{$page}</div>
			</div>
		</div>
	</div>
</div>
<include file="Public:footer"/>
<block name="script">
	<script type="text/javascript" charset="utf-8">
		// Đánh dấu điều hướng
		highlight_subnav("{:U('User/qianbao')}");
	</script>
</block>
