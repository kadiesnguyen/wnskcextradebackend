<include file="Public:header"/>
<div id="main-content">
    <div id="top-alert" class="fixed alert alert-error" style="display: none;">
        <button class="close fixed" style="margin-top: 4px;">×</button>
        <div class="alert-content">{:L('Alert content')}</div>
    </div>
    <div id="main" class="main">
        <div class="main-title-h">
            <span class="h1-title">{:L('Edit user assets')}</span>
            <notempty name="name">
                <span class="h2-title">>><a href="{:U('User/coin')}">{:L('Asset list')}</a></span>
            </notempty>
        </div>
        <div class="tab-wrap">
            <div class="tab-content">
                <form id="form" action="{:U('User/coinEdit')}" method="post" class="form-horizontal">
                    <div id="tab" class="tab-pane in tab">
                        <div class="form-item cf">
                            <table>
                                <tr class="controls">
                                    <td class="item-label">{:L('User ID')}:</td>
                                    <td>{$data.userid}</td>
                                    <td class="item-note"></td>
                                </tr>
                                <tr class="controls">
                                    <td class="item-label">{:L('User name')}:</td>
                                    <td>{$user}</td>
                                    <td class="item-note"></td>
                                </tr>
                                <volist name="coinlist" id="v">
                                    <tr class="controls">
                                        <td class="item-label">{:L('Available')} {$v['title']}:</td>
                                        <td><input type="text" class="form-control input-10x" name="{$v['name']}" value="{$data[$v['name']]*1}"></td>
                                        <td class="item-note">{:L('Edit carefully note')}</td>
                                    </tr>
                                </volist>
                                <tr class="controls">
                                    <td class="item-label"></td>
                                    <td>
                                        <div class="form-item cf">
                                            <button class="btn submit-btn ajax-post" id="submit" type="submit" target-form="form-horizontal">{:L('Submit')}</button>
                                            <a class="btn btn-return" href="{$Think.server.HTTP_REFERER}">{:L('Go back')}</a>
                                            <notempty name="data.id"><input type="hidden" name="id" value="{$data.id}"/></notempty>
                                        </div>
                                    </td>
                                    <td><b>{:L('Note')}:</b> {:L('USDT edit note')}</td>
                                </tr>
                            </table>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">
    // Gửi form
    $('#submit').click(function () {
        $('#form').submit();
    });
</script>
<include file="Public:footer"/>
<block name="script">
    <script type="text/javascript" charset="utf-8">
        // Đánh dấu điều hướng
        highlight_subnav("{:U('User/coin')}");
    </script>
</block>
